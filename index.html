  { id: 43, topic: "strings", difficulty: 1, question: "מה יודפס?\ns = 'shalom'\nprint(s[0])", options: ["h", "a", "s", "l"], answerIdx: 2, explanation: "האינדקס הראשון הוא 0, ובו התו s." },
  { id: 44, topic: "lists", difficulty: 1, question: "מה יודפס?\nlst = [5]\nlst.append(10)\nprint(lst)", options: ["[10, 5]", "[5]", "שגיאה", "[5, 10]"], answerIdx: 3, explanation: "append מוסיף 10 לסוף הרשימה הקיימת." },
  { id: 45, topic: "conditions", difficulty: 3, question: "מה יודפס?\nx = 8\nif x % 3 == 0:\n    print('א')\nelif x % 4 == 0:\n    print('ב')\nelse:\n    print('ג')", options: ["א", "ג", "ב", "שגיאה"], answerIdx: 2, explanation: "8 אינו מתחלק ב־3 אך מתחלק ב־4, ולכן נבחר ענף elif." }
];

const topicNames={loops:"לולאות",functions:"פונקציות",strings:"מחרוזות",lists:"רשימות",conditions:"תנאים",recursion:"רקורסיה"};
function weakTopicRanker(results){if(!Array.isArray(results))throw new TypeError("Input must be an array");const valid=results.filter(r=>r&&typeof r.topic==="string"&&Number.isFinite(r.secondsSpent)&&r.secondsSpent>=0);const map=new Map;for(const r of valid){if(!map.has(r.topic))map.set(r.topic,{total:0,wrong:0,seconds:0});const d=map.get(r.topic);d.total++;if(!r.correct)d.wrong++;d.seconds+=r.secondsSpent}const rows=[...map].map(([topic,d])=>({topic,total:d.total,wrong:d.wrong,avgSeconds:d.seconds/d.total}));const max=Math.max(0,...rows.map(r=>r.avgSeconds));return rows.map(r=>({topic:r.topic,score:Math.round(((r.wrong/r.total)*.7+(max?r.avgSeconds/max:0)*.3)*1000)/1000,attempts:r.total,errorRate:Math.round(r.wrong/r.total*1000)/1000})).sort((a,b)=>b.score-a.score||a.topic.localeCompare(b.topic))}
function calculateInitialPassProbability(correct,total,difficulty="medium"){if(!Number.isInteger(total)||total<=0||!Number.isInteger(correct)||correct<0||correct>total)throw new Error("invalid score");if(correct===0)return 0;return correct/total*({easy:1,medium:.8,hard:.6}[difficulty]||.8)}
function generateInitialStudyPlan(examDate,topics,slots){const plan=[],warnings=[];const ordered=[...topics].sort((a,b)=>b.estimatedHoursTotal-a.estimatedHoursTotal);let index=0;for(const slot of slots){if(!ordered.length)break;const topic=ordered[index%ordered.length];plan.push({date:slot.day,topic:topic.name,hours:Math.min(1,slot.endHour-slot.startHour),type:index<2?"review":"practice"});index++}if(!plan.length)warnings.push("No available study slots");return{plan,warnings}}

const $=id=>document.getElementById(id);let quiz=[],at=0,answers=[],questionStarted=0,timerId;
function renderTopics(){$("topics").innerHTML=Object.entries(topicNames).map(([key,name])=>`<label class="topic"><input type="checkbox" value="${key}" checked><span>${name}</span></label>`).join("")}
function seededQuiz(pool,count){let seed=(Date.now()^performance.now()*1000)|0,r=[...pool];const rnd=()=>{seed=(seed+0x6D2B79F5)|0;let t=Math.imul(seed^seed>>>15,1|seed);t=(t+Math.imul(t^t>>>7,61|t))^t;return((t^t>>>14)>>>0)/4294967296};for(let i=r.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r.slice(0,Math.min(count,r.length))}
function startQuiz(){const topics=[...document.querySelectorAll("#topics input:checked")].map(x=>x.value);if(!topics.length){alert("בחר לפחות נושא אחד");return}const diff=$("difficulty").value;const pool=questionBank().filter(q=>topics.includes(q.topic)&&(!diff||q.difficulty===+diff));quiz=seededQuiz(pool,+$("count").value);if(!quiz.length){alert("אין שאלות בשילוב שבחרת");return}at=0;answers=[];$("start").classList.add("hidden");$("results").classList.add("hidden");$("quiz").classList.remove("hidden");showQuestion()}
function showQuestion(){const q=quiz[at];questionStarted=Date.now();$("counter").textContent=`שאלה ${at+1} מתוך ${quiz.length}`;$("progress").style.width=`${at/quiz.length*100}%`;$("topicTag").textContent=topicNames[q.topic];$("levelTag").textContent=`רמה ${q.difficulty}`;const parts=q.question.split("\n");$("questionTitle").textContent=parts.shift();$("prompt").textContent=parts.join("\n");$("answers").innerHTML=q.options.map((o,i)=>`<button class="answer" data-index="${i}">${o}</button>`).join("");$("feedback").classList.add("hidden");$("nextBtn").classList.add("hidden");document.querySelectorAll(".answer").forEach(b=>b.onclick=()=>answerQuestion(+b.dataset.index));clearInterval(timerId);tick();timerId=setInterval(tick,1000)}
function tick(){const sec=Math.floor((Date.now()-questionStarted)/1000);$("timer").textContent=`${String(Math.floor(sec/60)).padStart(2,"0")}:${String(sec%60).padStart(2,"0")}`}
function answerQuestion(selected){clearInterval(timerId);const q=quiz[at],correct=selected===q.answerIdx,seconds=(Date.now()-questionStarted)/1000;answers.push({topic:q.topic,correct,secondsSpent:seconds});document.querySelectorAll(".answer").forEach((b,i)=>{b.disabled=true;if(i===q.answerIdx)b.classList.add("correct");else if(i===selected)b.classList.add("wrong")});$("feedback").innerHTML=`<strong>${correct?"✓ תשובה נכונה":"✗ כמעט — הנה הפתרון"}</strong>${q.explanation}`;$("feedback").classList.remove("hidden");$("nextBtn").textContent=at===quiz.length-1?"לתוצאות":"לשאלה הבאה";$("nextBtn").classList.remove("hidden")}
function next(){at++;if(at<quiz.length)showQuestion();else showResults()}
function futureSlots(){const slots=[];for(let i=1;i<=5;i++){const d=new Date;d.setDate(d.getDate()+i);slots.push({day:d.toISOString().slice(0,10),startHour:18,endHour:19})}return slots}
function showResults(){clearInterval(timerId);$("quiz").classList.add("hidden");$("results").classList.remove("hidden");const correct=answers.filter(a=>a.correct).length,pct=Math.round(correct/answers.length*100),prob=calculateInitialPassProbability(correct,answers.length,"medium"),ranked=weakTopicRanker(answers),weak=ranked.filter(r=>r.errorRate>0).slice(0,3);$("scoreRing").style.setProperty("--score",`${pct*3.6}deg`);$("scoreText").textContent=`${pct}%`;$("resultTitle").textContent=pct>=70?"אתה בכיוון מצוין":pct>=50?"קרוב למעבר — ממשיכים לדייק":"מצאנו איפה לחזק";$("resultCopy").textContent=`ענית נכון על ${correct} מתוך ${answers.length}. ההמלצות למטה מבוססות על הדיוק וזמן המענה שלך.`;$("probability").textContent=`${Math.round(prob*100)}%`;$("probabilityBar").style.width=`${prob*100}%`;const midpoint=Math.max(1,Math.floor(answers.length/2)),first=answers.slice(0,midpoint).filter(a=>a.correct).length/midpoint,last=answers.slice(midpoint),second=last.length?last.filter(a=>a.correct).length/last.length:first;$("trend").textContent=second>first?"מגמה חיובית: השתפרת לאורך הבוחן.":second<first?"הדיוק ירד בחצי השני — כדאי לתרגל בקצב רגוע.":"הדיוק נשאר יציב לאורך הבוחן.";$("weakTopics").innerHTML=weak.length?weak.map(r=>`<li><span>${topicNames[r.topic]}</span><b>${Math.round(r.errorRate*100)}% טעויות</b></li>`).join(""):`<li><span>לא זוהתה חולשה בולטת</span><b>כל הכבוד</b></li>`;const focus=(weak.length?weak:ranked.slice(0,2)).map((r,i)=>({name:topicNames[r.topic],difficulty:i?"medium":"hard",estimatedHoursTotal:2-i*.5}));const plan=generateInitialStudyPlan(new Date(Date.now()+7*864e5),focus,futureSlots()).plan;$("studyPlan").innerHTML=plan.length?plan.map(p=>`<li><span>${new Date(p.date+"T00:00:00").toLocaleDateString("he-IL",{weekday:"short",day:"numeric",month:"numeric"})} · ${p.topic}</span><b>${p.hours} שעה</b></li>`).join(""):`<li>אין צורך בתוכנית חיזוק כרגע.</li>`}
$("startBtn").onclick=startQuiz;$("nextBtn").onclick=next;$("restartBtn").onclick=()=>{$("results").classList.add("hidden");$("start").classList.remove("hidden")};renderTopics();
  </script>
